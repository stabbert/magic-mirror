[package]
name = "magic-mirror-app"
version = "2.0.0"
description = "A Tauri App for a Magic Mirror"
authors = ["stabbert"]
license = "MIT"
repository = "https://github.com/stabbert/magic-mirror"
default-run = "magic-mirror-app"
edition = "2021"
rust-version = "1.84.1"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[build-dependencies]
tauri-build = { version = "2.0.5", features = [] }

[dependencies]
openssl = { version = "0.10.70" }
serde_json = "1.0.138"
serde = { version = "1.0.217", features = ["derive"] }
tauri = { version = "2.2.5", features = [] }
tauri-plugin-http = "2.3.0"
tauri-plugin-fs = "2.2.0"
